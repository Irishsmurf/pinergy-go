version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - unconvert
    - unparam
    - gosec
    - bodyclose
    - noctx
    - exhaustive
    - gocritic
  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - goimports
