name: Integration Tests

on:
  # Manual trigger — run on demand from the Actions tab.
  workflow_dispatch:
  # Also runs on push to main when the repo variable is enabled.
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    # Only runs when explicitly enabled via a repository variable.
    # Set PINERGY_INTEGRATION_ENABLED = true in Settings → Variables → Actions.
    if: ${{ vars.PINERGY_INTEGRATION_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run integration tests
        env:
          PINERGY_EMAIL: ${{ secrets.PINERGY_EMAIL }}
          PINERGY_PASSWORD: ${{ secrets.PINERGY_PASSWORD }}
          # Optional: override the API base URL for staging/mock environments.
          # PINERGY_BASE_URL: ${{ secrets.PINERGY_BASE_URL }}
        run: go test -tags=integration -race -count=1 -timeout=300s -v github.com/Irishsmurf/pinergy-go
