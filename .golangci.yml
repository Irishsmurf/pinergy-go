version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/Irishsmurf/pinergy-go

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
